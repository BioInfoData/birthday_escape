<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>סיימתם!</title>
    <link rel="stylesheet" href="assets/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .prize-box {
            background: linear-gradient(135deg, #e2f0cb 0%, #98ddca 100%);
            padding: 2rem;
            border-radius: 20px;
            margin: 2rem 0;
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="card">
            <h1 id="finish-title">כל הכבוד!!! 🎉</h1>
            <p id="finish-body">צלחתם את כל המכשולים, פתרתם את כל החידות והוכחתם שאתם אלופים אמיתיים!</p>

            <div class="prize-box">
                <p id="prize-text">טוען פרס...</p>
            </div>

            <p id="finish-footer">מקווים שנהניתם! יום הולדת שמח! 🥳</p>

            <a href="index.html" class="btn btn-secondary" style="margin-top: 2rem;">חזור לדף הבית</a>
        </div>
    </div>

    <footer>
        <p>© 2024 משחק יום הולדת. <a href="setup.html" style="color: inherit; opacity: 0.5;">הגדרות</a></p>
    </footer>

    <!-- Fireworks/Confetti handled by styles/app mostly, but lets add extra fun here if needed -->

    <script src="assets/game-config.js"></script>
    <script src="assets/app.js"></script>
</body>

</html>
